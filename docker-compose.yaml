services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    networks:
      - mern

  backend:
    build: ./backend
    ports:
      - "5050:5050"
    networks:
      - mern
    depends_on:
      - mongo

  mongo:
    image: mongo
    ports: 
      - "27017:27017"
    networks:
      - mern
    volumes:
      - mongo-data:/data/db
    depends_on:
      - frontend

networks:
  mern:
    driver: bridge

volumes:
  mongo-data:
    driver: local 
    